body:
  text: 鴈門公妙解録並序余少抱其疾專意修飬至於金石服餌亦嘗動求竊見今時好事者不顧貨財大修爐火謂河求立成變土石為金丹丹砂立化可壯筋髓然而往往為藥所誤醫救莫及何哉豈根源不正歟將師法不明歟奚終不相副如此之甚也余因覽道書偶見九霄君告劉泓丹藥要訣乃論俗徒都未窺至道毫末而妄自誇衒誑誘時人凡所施為無非自𢦤之捷徑能無悲乎真仙之言定不誣矣余以懷滯惑方困於是今故訣其要語書之座隅目之曰妙解録冀觀覽之時疑撓盡釋雖未達金液保身之術當必免毒丹傷命之虞亦天年之幸也如有同我斯志者固願攻其未悟耳大中九年乙亥歲五月十八日甲子謹序辨金石藥並雲毒訣漢安帝時有劉泓者久學至道棄官入山後至延光元年十一月九霄君來降為憫道士不知燒丹正道乃指陳至藥之根源分別雜丹之門户並解金石毒保仙丸方傳付於泓疏之於後九霄君謂劉泓曰夫學鍊金液還丹並服丹砂硫黃兼諸乳石等世人苦求得之將謂便成至藥不知深淺競學服餌皆望長生不死者也並不悟金丹並諸石藥各有本性懷大毒在其中道士服之從羲軒以來萬不存一未有不死者矣泓再拜稽首問曰何也九霄君曰世人所造金丹服餌皆求長生愚者即劫力以資俗人又欲將至藥求其㸃化金銀榮其行尸以飬㒒妾但一起心即是必死之兆至藥亦無因而見也惟仙教藥無雙能功無二用又不知藥有至毒造成丹後世人只知餘甘子制河車磁石引針硫黃乾水銀將謂制金丹了便無毒矣假如先賢鍊秋石秋石以地霜結成能引生汞亦能制金石毒如有伏者中路毒發不可禁止必見死矣縱不死亦卒患惡瘡此為先兆也秋石云能解毒且見朱砂紫粉毒霜並硫黃等被秋石制伏豈有毒矣先聖遺教世人難知焉知之者真人也不知者凡人也泓又問曰變化銅鐵之藥並不堪服何也九霄君曰緣㸃化藥法多用礬石硝石硇砂之類共結成毒雖能乾汞及化銅鐡其用火時候亦與金丹藥不同緣毒成結在其中縱千消萬化毒終不出亦如人毒在心內不從外入亦如木中有火火元在內其㸃化之道本善在內各受其性色日法作不同氣遞相生各懷毒性雄雌硝𥑚雜類相助其火候不依天時地理之法或近或遠毒者蓋不禀天道而成則知古往仙人不服此藥明矣緣有大毒造化之力不足也泓又問曰㸃化之藥為有雜石衆毒固不堪服常聞換頭紫粉七返丹砂無礬𥑚所雜可以服否九霄君曰此二藥世人千百中無一人解者縱能為之亦不堪服何也且換頭紫粉是仙人所修以為宫室所用緣有硫黃在其中水銀入硫黃含大毒豈可服哉又七返丹砂雖燠令伏火本無四象五行筋骨血肉隂陽氣不全如服之令人五藏血乾凡人血少即螺血盡即死矣泓又問曰世人修丹砂顆塊不破顔色如故大火燒之不動者復如何九霄君曰凡朱砂凝結之初皆於砂石中成質從是光明砂飛之每一斤只得十二兩汞其四兩即是山澤滓漬之物懷其大毒道士若不解出滓便相和服之者則澀人氣脉乾人血液豈得益乎況從古至今道士未經至仙之教皆謂伏火丹砂是死水銀妄言金砂入五內有不死之兆甚錯矣世人豈不知從生服者未有不死之人唯硫黃獨體不入他藥猶能去人積冷不可多服緣是孤陽氣不全耳其他小術固所不論泓又問曰何藥則堪服可以延駐九霄君曰我仙人所鍊至藥例是日魂月魄四氣為象日魂不離日裏月魂不離月中假如至藥亦不離從木而生何也木之從青以水銀內含其火火為陽以象朱砂朱砂屬離離為南方火之位火為朱砂亦同木中有火配木火入中宫之土土能尅水火能生土而成道如人初生嬰孩乃長大還為人父母遞換相承本處其一至藥根本亦不處二道之無根以心為根道之無用以四時受氣發生各得其所為用道因氣之生因氣而死至藥服之不死者蓋為不參雜諸味無毒銷成汁為器或方或圓並皆赫然通徹晝夜光明然始堪服去人昏沉定人神思除邪魅耐寒署皮膚潤澤髭鬢不白返老成少千日可驗故服之不死泓又問曰至藥有幾般九霄君曰真正之門有三焉一曰神符上仙上丹二曰白雪中仙上丹三曰九轉下仙上丹其三般丹同出一門而異名各有三一禁法亦不可輕傳於人何謂不可輕傳假如神符丹若無太一宫天一宮成者即名曰液終不見成器緣天一宫總名其三一此不可傳白雪若不堅不成冰不入調青不受青氣共粉毒無別亦如日無鳥而不明月無桂而無魄相似緣凝成堅冰調青如磁石引針其三一不可傳曽青白雪成質其三一不可傳白雪成結即入其紫宫用緣以四氣納萬象而成質其三一不可傳夫至藥若不受四氣混沌氣豈得號曰龍虎之丹所以我仙人天地之玄化成寶同日月之光如神符白雪修鍊功畢即有上升之路九轉即返老成少顔如童子壽同南山矣其三一之訣不許輕傳豈不冝哉泓又問曰三一旨玄矣祕矣未知何人即可傳授九霄君曰如吾者即可傳授夫三一者造化之機關也非獨至藥有之人身中亦皆有之自備若能修身中三一者即子母不相離神氣自相守怡怡和煦光照明白子不見至陽之月當畫之景手風雲不生纎埃不動碧空澄靜豈有障翳哉人亦有之若能常調三一萬慮不生與碧空之氣相合內外光明虛元同體者亦可升騰笑世人或有竊聞此道者云是服氣乃鼻吸口吐鼓腮咽之立可致其殞斃亦如藥中錯服毒丹不可救已所以身中三一與至藥三一不殊其身中三一亦不輕傳也泓又問曰如有人先服丹砂及乳石硫黃紫粉毒發者如何救解之九霄君曰已服死者即不言也如有已後服者只可救之遞相勸道士急造保仙丸救之可存性命假如換頭紫粉緣不入凝白雪為骨骨為陽及無調青入者即名大毒紫粉人服不看多少遠近如喫雜物犯者不問日月遲晚發不在醫限例不出三日五日無藥可救之如服硫黃紫粉伏火丹砂及諸乳石若毒發保仙丸猶可救之十有二三命在若曾服諸石藥之毒雖未發能防備預服保仙丸尤妙泓又問曰三大丹既延駐人命無毒如未畢功可以服否九霄君曰神符白雪九轉未經太一宮天一宮者四象未全不可服如有人悮服者忽覺發動不安但急服伏龍肝汁並甘草湯生菉豆汁乃立定少見命終何也緣此三藥並無雜類相撓只空有火毒遂不至於死除此三般其餘丹砂之流雖然一朝一夕强餐亦能益色如忽發動命即危矣泓曰保仙丸法可得聞乎九霄君曰保仙五子丸此法仙家所祕然亦令擇有道之士以授之護其性命今一一教爾並粗舉三丹大略爾宜熟思之流傳以救未悟者無忘吾言吾將往矣泓乃雨淚稽顙再拜九霄君舉手告別入雲不見矣劉泓乃於山中刻石書記後有道士見之録出遂流傳於世至唐開元中通玄先生張果獻上此方明皇喜悅祕於禁中通玄兼述三丹之功極備但無修丹之法今不書去繁也鴈門公妙解録
